name: CI

# Runs on every push / PR to main. Render deploys only after this is green
# (enable "Auto-Deploy: After CI checks pass" on the Render service).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (syntax check)
        run: npm run lint

      - name: Test (API smoke tests)
        run: npm test
